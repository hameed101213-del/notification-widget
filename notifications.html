<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="manifest" href="manifest.json" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Notifications" />
  <title>Notification Widget</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    .notification-widget {
      width: min(92vw, 340px);
      margin: 16px auto;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
      background: #ffffff;
      overflow: hidden;
    }

    .widget-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      background: #111827;
      color: #ffffff;
    }

    .widget-header h4 {
      margin: 0;
      font-size: 15px;
      font-weight: 600;
    }

    .widget-status {
      font-size: 12px;
      opacity: 0.85;
    }

    .message-card {
      padding: 16px 14px;
    }

    .message-label {
      margin: 0 0 8px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: #6b7280;
      text-transform: uppercase;
    }

    .message-text {
      margin: 0;
      font-size: 16px;
      line-height: 1.4;
      color: #111827;
    }

    .message-time {
      margin-top: 10px;
      font-size: 12px;
      color: #6b7280;
    }
  </style>
</head>
<body>
  <div class="notification-widget">
    <div class="widget-header">
      <h4>Chat Widget</h4>
      <span class="widget-status" id="widgetStatus">Loading...</span>
    </div>
    <div class="message-card">
      <p class="message-label">Specific chatbot message</p>
      <p class="message-text" id="chatMessage"></p>
      <div class="message-time" id="messageTime"></div>
    </div>
  </div>

  <script>
    const chatMessage = document.getElementById('chatMessage');
    const messageTime = document.getElementById('messageTime');
    const widgetStatus = document.getElementById('widgetStatus');

    const skipPatterns = [
      'https://www.axa-gulf.com/en',
      'aegov-file-uploaded'
    ];

    function shouldSkipMessage(rawMessage) {
      const normalized = String(rawMessage || '').toLowerCase();
      return skipPatterns.some((pattern) => normalized.includes(pattern));
    }

    async function fetchSpecificChatMessage() {
      return {
        message: '🤖 Remember to drink water and take a short break.',
        updatedAt: new Date()
      };
    }

    async function updateWidget() {
      const data = await fetchSpecificChatMessage();

      if (shouldSkipMessage(data.message)) {
        widgetStatus.textContent = 'Filtered';
        messageTime.textContent = `Updated: ${new Date().toLocaleTimeString()} (noisy message skipped)`;
        return;
      }

      chatMessage.textContent = data.message;
      messageTime.textContent = `Updated: ${data.updatedAt.toLocaleTimeString()}`;
      widgetStatus.textContent = 'Live';
    }

    updateWidget();
    setInterval(updateWidget, 15000);
  </script>
</body>
</html>
