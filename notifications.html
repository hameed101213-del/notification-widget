<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="manifest" href="manifest.json" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Notifications" />
  <title>Notification Widget</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #f5f5f5;
    }

    .notification-widget {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 1000;
    }

    .bell {
      font-size: 30px;
      cursor: pointer;
      position: relative;
    }

    .bell::after {
      content: '';
      position: absolute;
      top: -5px;
      right: -5px;
      width: 10px;
      height: 10px;
      background: red;
      border-radius: 50%;
      display: none;
    }

    .bell.has-new::after {
      display: block;
    }

    .notification-panel {
      display: none;
      position: absolute;
      top: 40px;
      right: 0;
      width: 250px;
      background: #fff;
      border: 1px solid #ccc;
      box-shadow: 0 0 8px rgba(0, 0, 0, 0.1);
      padding: 10px;
    }

    .notification-panel h4 {
      margin-top: 0;
    }

    .notification-panel ul {
      list-style: none;
      padding: 0;
      margin: 0;
      max-height: 200px;
      overflow-y: auto;
    }

    .notification-panel li {
      padding: 5px 0;
      border-bottom: 1px solid #eee;
    }

    .row {
      width: 100%;
      margin-top: 24px;
      max-width: 920px;
    }

    .table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
    }

    .table-header td {
      font-weight: bold;
      background: #f0f0f0;
    }

    td,
    th {
      border: 1px solid #ddd;
      padding: 8px;
      text-align: left;
    }

    .btn {
      border: none;
      border-radius: 4px;
      color: #fff;
      padding: 8px 12px;
      cursor: pointer;
    }

    .btn-danger {
      background: #dc3545;
    }

    .btn-secondary {
      background: #9e9e9e;
    }

    .otp-card {
      max-width: 520px;
      margin-top: 16px;
      background: #fff;
      border: 1px solid #e0d34f;
      border-radius: 4px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }

    .form-group {
      max-width: 420px;
      margin-top: 16px;
    }

    .form-control {
      width: 100%;
      box-sizing: border-box;
      padding: 8px;
      margin-top: 8px;
    }

    .sterick::after {
      content: ' *';
      color: #dc3545;
    }

    .otp-actions {
      margin-top: 16px;
      display: flex;
      gap: 10px;
    }
  </style>
</head>
<body>
  <div class="notification-widget">
    <div class="bell" id="bell">&#128276;</div>
    <div class="notification-panel" id="notificationPanel">
      <h4>Notifications</h4>
      <ul id="notificationList"></ul>
    </div>
  </div>

  <div class="row" id="tblOwners" style="display: none;">
    <div id="divCompanyNo" class="col-sm-12">
      <table class="table table-bordered">
        <thead class="table-header">
          <tr>
            <td>Owner Code / الكود الشخصي للمالك</td>
            <td>Owner Name</td>
            <td>اسم المالك</td>
            <td>ESign Card Serial No</td>
            <td>Mobile Number</td>
            <td>Action</td>
          </tr>
        </thead>
        <tbody class="tbody">
          <tr>
            <td><span>40321119618118</span></td>
            <td><span>ABDU KASSA MEKONEN</span></td>
            <td><span>عبدو كاسا ميكونين</span></td>
            <td><span>null</span></td>
            <td><span>050-XXXX-347</span></td>
            <td><button type="submit" class="btn btn-danger mt-2 btnOTP" id="40321119618118">Send OTP</button></td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="col-sm-12 otp-card" id="otpdivRenewWP" style="display: none;">
    <div class="form-group">
      <div class="mt-3" id="MaskMobileMessage">OTP sent to employee mobile no</div>
      <label class="sterick">Enter Mobile OTP</label>
      <input autofocus="autofocus" class="form-control" id="otptxt" maxlength="6" name="OTP" onkeypress="noNumbers(event);" inputmode="numeric" autocomplete="one-time-code" type="text" value="" />
      <input data-val="true" data-val-required="The OTPRequired field is required." id="otpRequired" name="OTPRequired" type="hidden" value="False" />
      <div class="otp-actions">
        <button type="button" class="btn btn-danger" id="otpOk" disabled>Ok</button>
        <button type="button" class="btn btn-secondary" id="otpResend">Resend</button>
      </div>
    </div>
  </div>

  <script>
    const bell = document.getElementById('bell');
    const panel = document.getElementById('notificationPanel');
    const list = document.getElementById('notificationList');
    const ownersTable = document.getElementById('tblOwners');
    const otpSection = document.getElementById('otpdivRenewWP');
    const otpMessage = document.getElementById('MaskMobileMessage');
    const otpInput = document.getElementById('otptxt');
    const otpOk = document.getElementById('otpOk');

    bell.addEventListener('click', () => {
      panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
      bell.classList.remove('has-new');
    });

    async function fetchNotifications() {
      return [
        { message: '🔔 New message from Sarah' },
        { message: '📢 Site update released' },
        { message: '⚠️ Battery level is low' }
      ];
    }

    async function updateNotifications() {
      const notifications = await fetchNotifications();
      list.innerHTML = '';
      notifications.forEach((n) => {
        const item = document.createElement('li');
        item.textContent = n.message;
        list.appendChild(item);
      });

      if (notifications.length > 0) {
        bell.classList.add('has-new');
      }
    }

    function initializeOwnerTable() {
      const hasRows = ownersTable.querySelectorAll('.tbody tr').length > 0;
      ownersTable.style.display = hasRows ? 'block' : 'none';
    }

    function normalizeTableNullValues() {
      const tableCells = document.querySelectorAll('td span');
      tableCells.forEach((cell) => {
        if (cell.textContent.trim().toLowerCase() === 'null') {
          cell.textContent = '-';
        }
      });
    }

    function noNumbers(event) {
      const charCode = event.which || event.keyCode;
      if (charCode >= 48 && charCode <= 57) {
        return true;
      }

      if (charCode === 8 || charCode === 0) {
        return true;
      }

      event.preventDefault();
      return false;
    }

    function syncOtpInputState() {
      otpInput.value = otpInput.value.replace(/\D/g, '').slice(0, 6);
      otpOk.disabled = otpInput.value.length !== 6;
    }

    function bindOtpButtons() {
      const otpButtons = document.querySelectorAll('.btnOTP');
      otpButtons.forEach((button) => {
        button.addEventListener('click', (event) => {
          event.preventDefault();
          const currentRow = button.closest('tr');
          const mobileText = currentRow ? currentRow.children[4].textContent.trim() : '';
          otpMessage.textContent = `OTP sent to employee mobile no ${mobileText}`;
          otpInput.value = '';
          syncOtpInputState();
          otpSection.style.display = 'block';
          otpInput.focus();
        });
      });
    }

    otpInput.addEventListener('input', syncOtpInputState);

    updateNotifications();
    initializeOwnerTable();
    normalizeTableNullValues();
    bindOtpButtons();
    setInterval(updateNotifications, 15000);
  </script>
</body>
</html>
